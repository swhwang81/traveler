<!DOCTYPE html>
<html lang="ko">
<head>

  <title>워싱턴 DC 1박 2일 여행 일정 지도</title>
  <link rel="preconnect" href="https://unpkg.com">

  <style>
    :root { --bg:#f4f5f7; --card:#fff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:var(--bg); color:var(--ink); }
    header { background:linear-gradient(135deg,#111827,#7f1d1d); color:white; padding:24px 28px 20px; }

    .tabs { margin-top:16px; display:flex; flex-wrap:wrap; gap:8px; }

    .tab.active { background:white; color:#111827; font-weight:800; }
    .layout { display:grid; grid-template-columns:minmax(520px,52%) 1fr; gap:16px; padding:16px; }
    .left { display:flex; flex-direction:column; gap:16px; min-width:0; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:0 8px 22px rgba(17,24,39,.07); overflow:hidden; }
    .day-head { padding:16px 18px; border-bottom:1px solid var(--line); }
    .day-head h2 { margin:0 0 6px; font-size:20px; }
    .day-head p { margin:0; color:var(--muted); line-height:1.5; font-size:14px; }
    .route-link { display:inline-block; margin-top:10px; color:#0b57d0; font-weight:800; text-decoration:none; font-size:14px; }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; padding:10px 12px; color:var(--muted); background:#f9fafb; border-bottom:1px solid var(--line); font-size:12px; white-space:nowrap; }
    td { padding:12px; border-bottom:1px solid var(--line); vertical-align:top; font-size:14px; line-height:1.45; }
    tr.place-row { cursor:pointer; }
    tr.place-row:hover { background:#fff1f2; }
    tr.place-row.active { background:#fee2e2; outline:2px solid #fca5a5; outline-offset:-2px; }
    .thumb { width:86px; height:62px; border-radius:12px; object-fit:cover; background:#f3f4f6; border:1px solid var(--line); display:block; }
    .placeholder { width:86px; height:62px; border-radius:12px; display:flex; align-items:center; justify-content:center; text-align:center; padding:6px; background:linear-gradient(135deg,#e5e7eb,#f9fafb); border:1px solid var(--line); color:var(--muted); font-size:11px; }
    .time { font-weight:800; white-space:nowrap; }
    .name { font-weight:800; }
    .ko { color:var(--muted); font-size:12px; margin-top:3px; }
    .tag { display:inline-block; padding:3px 7px; border-radius:999px; background:#f3f4f6; font-size:12px; color:#374151; white-space:nowrap; }
    .desc { color:#4b5563; font-size:13px; }
    .map-card { position:sticky; top:16px; height:calc(100vh - 32px); display:flex; flex-direction:column; background:white; border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 8px 22px rgba(17,24,39,.07); }
    #map { flex:1; min-height:500px; width:100%; }
    .info { border-top:1px solid var(--line); padding:14px 16px; display:grid; grid-template-columns:128px 1fr; gap:14px; align-items:start; }
    #selectedImage { width:128px; height:92px; border-radius:14px; object-fit:cover; background:#f3f4f6; border:1px solid var(--line); }
    .info h3 { margin:0 0 4px; font-size:18px; }
    .info p { margin:0; color:var(--muted); font-size:13px; line-height:1.5; }
    .popup-img { width:170px; height:105px; object-fit:cover; border-radius:10px; margin-bottom:7px; background:#f3f4f6; }
    .popup-title { font-weight:800; margin-bottom:3px; }
    .popup-sub { color:#6b7280; font-size:12px; margin-bottom:6px; }
    .popup-desc { font-size:13px; line-height:1.45; }
    .hidden { display:none; }
    @media(max-width:1100px) { .layout { grid-template-columns:1fr; } .map-card { position:relative; top:0; height:68vh; order:-1; } }
    @media(max-width:720px) { header { padding:22px 18px; } header h1 { font-size:23px; } .layout { padding:10px; } th:nth-child(5), td:nth-child(5) { display:none; } .thumb,.placeholder { width:74px; height:54px; } .info { grid-template-columns:92px 1fr; } #selectedImage { width:92px; height:70px; } }

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
function fallbackImage(place) { return `https://source.unsplash.com/320x220/?${encodeURIComponent(place.query || place.name)}`; }
async function loadImage(place, globalIndex) {
  if (imageCache.has(globalIndex)) return imageCache.get(globalIndex);
  let url = `https://en.wikipedia.org/api/rest_v1/page/summary/${place.wiki}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("no image");
    const data = await res.json();
    const img = data.thumbnail?.source || data.originalimage?.source || fallbackImage(place);
    imageCache.set(globalIndex, img);
    return img;
  } catch(e) {
    const img = fallbackImage(place);
    imageCache.set(globalIndex, img);
    return img;
  }
}
function rowHtml(place, globalIndex) {
  return `<tr class="place-row" data-index="${globalIndex}" data-day="${place.dayIndex}">
    <td><div class="placeholder" id="thumbBox-${globalIndex}">${place.category}</div></td>
    <td class="time">${place.time}</td>
    <td><div class="name">${place.stopIndex+1}. ${place.name}</div><div class="ko">${place.ko}</div></td>
    <td><span class="tag">${place.category}</span></td>
    <td><div class="desc">${place.description}</div></td>
  </tr>`;
}
function buildCards() {
  const container = document.getElementById("dayCards");
  container.innerHTML = days.map((day, di) => {
    const rows = allPlaces.map((p, gi) => p.dayIndex === di ? rowHtml(p, gi) : "").join("");
    return `<section class="card day-card" data-day-card="${di}">
      <div class="day-head">
        <h2>${day.date} · ${day.title}</h2>
        <p>${day.summary}</p>
        <a class="route-link" href="${day.googleMapsUrl}" target="_blank">Google Maps에서 이 날짜 경로 열기</a>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>사진</th><th>시간</th><th>장소</th><th>구분</th><th>설명</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </section>`;
  }).join("");
}
function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = `<button class="tab active" data-day="all">전체</button>` + days.map((d,i)=>`<button class="tab" data-day="${i}">${d.date}</button>`).join("");
}
buildCards(); buildTabs();

const map = L.map("map").setView([39.5,-79.5], 6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {

}).addTo(map);

const colors = ["#991b1b","#2563eb"];
const markerMap = new Map();
const polylines = [];

function markerIcon(place) {
  const color = colors[place.dayIndex % colors.length];

    iconSize:[28,28], iconAnchor:[14,14]
  });
}
function popupHtml(place, img) {
  return `${img ? `<img class="popup-img" src="${img}" alt="${place.name}">` : ""}
  <div class="popup-title">${place.date} · ${place.stopIndex+1}. ${place.name}</div>
  <div class="popup-sub">${place.ko} · ${place.time} · ${place.category}</div>
  <div class="popup-desc">${place.description}<br><br><b>Tip:</b> ${place.tip}</div>`;
}
allPlaces.forEach((place, gi) => {
  const marker = L.marker([place.lat, place.lon], {icon:markerIcon(place)})
    .addTo(map)
    .bindPopup(`<div class="popup-title">${place.name}</div><div class="popup-desc">사진을 불러오는 중입니다.</div>`);
  marker.on("click", () => selectPlace(gi, true));
  markerMap.set(gi, marker);
  allBounds.push([place.lat, place.lon]);
});
days.forEach((day, di) => {
  const line = L.polyline(day.stops.map(s => [s.lat, s.lon]), {
    weight:4, opacity:.82, color:colors[di % colors.length]
  }).addTo(map);
  line.dayIndex = di;
  polylines.push(line);
});
map.fitBounds(allBounds, {padding:[40,40]});
async function populateImages() {
  for (let gi=0; gi<allPlaces.length; gi++) {
    const p = allPlaces[gi];
    const img = await loadImage(p, gi);
    const box = document.getElementById(`thumbBox-${gi}`);
    if (box) box.outerHTML = `<img class="thumb" id="thumb-${gi}" src="${img}" alt="${p.name}" loading="lazy">`;
    const marker = markerMap.get(gi);
    if (marker) marker.setPopupContent(popupHtml(p, img));
  }
}
async function selectPlace(gi, fromMarker=false) {
  const p = allPlaces[gi];
  const img = await loadImage(p, gi);
  document.querySelectorAll(".place-row").forEach(r=>r.classList.remove("active"));
  const row = document.querySelector(`.place-row[data-index="${gi}"]`);
  if (row) {
    row.classList.add("active");
    if (!fromMarker) row.scrollIntoView({behavior:"smooth", block:"center"});
  }
  map.setView([p.lat,p.lon], 13, {animate:true});
  const marker = markerMap.get(gi);
  marker.setPopupContent(popupHtml(p,img));
  marker.openPopup();
  document.getElementById("selectedImage").src = img;
  document.getElementById("selectedTitle").textContent = `${p.date} · ${p.name}`;
  document.getElementById("selectedText").textContent = `${p.ko} · ${p.time} · ${p.description}`;
}
document.querySelectorAll(".place-row").forEach(row => {
  row.addEventListener("click", () => selectPlace(Number(row.dataset.index)));
});
document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const d = btn.dataset.day;
    document.querySelectorAll(".day-card").forEach(card => {
      card.classList.toggle("hidden", d !== "all" && card.dataset.dayCard !== d);
    });
    allPlaces.forEach((p, gi) => {
      const show = d === "all" || String(p.dayIndex) === d;
      const marker = markerMap.get(gi);
      if (show) marker.addTo(map); else marker.removeFrom(map);
    });
    polylines.forEach(line => {
      const show = d === "all" || String(line.dayIndex) === d;
      if (show) line.addTo(map); else line.removeFrom(map);
    });
    if (d === "all") {
      map.fitBounds(allBounds, {padding:[40,40]});
    } else {
      const b = days[Number(d)].stops.map(s=>[s.lat,s.lon]);
      map.fitBounds(b, {padding:[40,40]});
    }
  });
});
populateImages();
setTimeout(()=>selectPlace(0), 500);
</script>
</body>
